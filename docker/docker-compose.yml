services:
  portfolio:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PUBLIC_FORMSPREE_FORM_ID: ${PUBLIC_FORMSPREE_FORM_ID:-}
        PUBLIC_TURNSTILE_SITE_KEY: ${PUBLIC_TURNSTILE_SITE_KEY:-}
        PUBLIC_CONTACT_EMAIL: ${PUBLIC_CONTACT_EMAIL:-}
        BASE_PATH: ${BASE_PATH:-}
    ports:
      - '${HOST_BIND:-127.0.0.1}:${HOST_PORT:-8080}:8080'
    expose:
      - '8080'
    volumes:
      - type: bind
        source: ${MEDIA_ROOT:-../static/videos}
        target: /usr/share/nginx/html/videos
        read_only: true
    restart: unless-stopped
    networks:
      - web
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

networks:
  web:
    name: web
